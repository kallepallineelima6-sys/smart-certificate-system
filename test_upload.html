<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Smart Certificate v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top left, #eef2ff, transparent),
                        radial-gradient(circle at bottom right, #fdf2f8, transparent);
        }

        .upload-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 1rem;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input[type="file"] {
            padding: 0.75rem;
            background: #f1f5f9;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            margin-right: 1rem;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-top: 1rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link:hover { text-decoration: underline; }
    </style>
</head>

<body>
    <div class="upload-card">
        <div class="header">
            <h2>New Certificate</h2>
            <p>Add a credential to your digital vault</p>
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="user_id">User Identifier (numeric)</label>
                <input type="number" id="user_id" placeholder="e.g. 101" required>
            </div>
            <div class="form-group">
                <label for="file">Select Document (Image or PDF)</label>
                <input type="file" id="file" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Securely Upload</button>
        </form>

        <div id="message"></div>
        <a href="view_certificates.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }

        document.getElementById("uploadForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById("submitBtn");
            const messageDiv = document.getElementById("message");
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Document...";
            messageDiv.style.display = "none";

            const formData = new FormData();
            formData.append("user_id", document.getElementById("user_id").value);
            formData.append("file", document.getElementById("file").files[0]);

            try {
                const res = await fetch("http://127.0.0.1:5005/upload", { 
                    method: "POST",
                    headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
                    body: formData
                });

                if (res.ok) {
                    messageDiv.innerText = "✅ Document processed and secured successfully!";
                    messageDiv.className = "success";
                    messageDiv.style.display = "block";
                    setTimeout(() => window.location.href = "view_certificates.html", 1500);
                } else {
                    const text = await res.text();
                    messageDiv.innerText = "❌ Upload failed: " + text;
                    messageDiv.className = "error";
                    messageDiv.style.display = "block";
                }
            } catch (err) {
                messageDiv.innerText = "Connection Error: Backend server might be offline";
                messageDiv.className = "error";
                messageDiv.style.display = "block";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Securely Upload";
            }
        });
    </script>
</body>

</html>
