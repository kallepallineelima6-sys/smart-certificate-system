<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Certificate v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f0f9ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.25rem;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        #success-msg {
            color: #10b981;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1.5rem;
            padding: 0.75rem;
            background: #dcfce7;
            border-radius: 0.75rem;
            display: none;
            font-weight: 500;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="header">
            <h1>Create Account</h1>
            <p>Join the secure certificate intelligence network</p>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="e.g. neelima" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="e.g. user@example.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="register()">Register Now</button>
        <div id="success-msg">Registration Successful! Redirecting...</div>
        
        <div class="footer-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        function register() {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const successMsg = document.getElementById("success-msg");

            if (!username || !email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            // Store user details in localStorage as requested
            const userData = {
                username: username,
                email: email,
                password: password
            };
            localStorage.setItem("user", JSON.stringify(userData));

            successMsg.style.display = "block";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        }
    </script>
</body>

</html>
